recorder:
  tensorboard:
    _target_: flow_planner.recorder.tensorboard.TensorboardRecorder
    save_path: ${oc.env:TENSORBOARD_LOG_PATH}
    rank: ${oc.env:RANK}
optimizer:
  _target_: torch.optim.AdamW
  _convert_: all
  lr: 0.0001
scheduler:
  _target_: flow_planner.core.common.train_scheduler.CosineAnnealingWarmUpRestarts
  epoch: ${train.epoch}
  warm_up_epoch: 5
ema:
  _target_: timm.utils.ModelEma
  decay: 0.999
  device: ${device}
project_root: ${oc.env:PROJECT_ROOT}
save_dir: ${oc.env:SAVE_DIR}/outputs/${project}/${job_name}/${now:%Y-%m-%d_%H-%M-%S}
save_every_since: 0
resume_path: null
pretrained_checkpoint: null
project: FlowPlannerTraining
job_name: flow_planner
logger_level: info
seed: 3402
device: cuda
num_workers: 4
use_wandb: false
pin_mem: true
train:
  batch_size: 2048
  epoch: 400
  save_utd: 20
ddp:
  distributed: true
  world_size: ${oc.env:WORLD_SIZE}
  rank: ${oc.env:LOCAL_RANK}
  init_process_group: nccl
  addr: ${oc.env:MASTER_ADDR, localhost}
  port: ${oc.env:MASTER:PORT, 29529}
model_type: x_start
