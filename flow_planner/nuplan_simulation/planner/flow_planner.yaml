flow_planner:
  _target_: flow_planner.planner.FlowPlanner
  _convert_: "all"

  config_path: ???
  ckpt_path: ???

  past_trajectory_sampling:
    _target_: nuplan.planning.simulation.trajectory.trajectory_sampling.TrajectorySampling
    _convert_: "all"

    num_poses: 20
    time_horizon: 2

  future_trajectory_sampling:
    _target_: nuplan.planning.simulation.trajectory.trajectory_sampling.TrajectorySampling
    _convert_: "all"

    num_poses: 80
    time_horizon: 8

  device: cuda
  use_cfg: true
  cfg_weight: 1.8
  num_candidates: 1
  bon_seed: -1  # -1=random, >=0=deterministic seed for Best-of-N candidates
  anchor_vocab_path: null
  anchor_mode: none
  anchor_predictor_ckpt: null
  candidate_selector_ckpt: null
  closed_loop_gate_ckpt: null
  closed_loop_gate_threshold: 0.5
  anchor_top_k: 3
  candidate_samples_per_anchor: 3
  candidate_samples_per_anchor_list: null
  candidate_trace_path: null
  candidate_trace_training_payload: false
  candidate_intervention_manifest_path: null
  anchor_state_dim: 3
  anchor_token_num: 4
  anchor_attn_heads: 8
