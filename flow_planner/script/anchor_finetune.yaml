hydra:
  run:
    dir: ${save_dir}
  job:
    name: ${job_name}

# Top-level Hydra config for Phase-1 anchor finetuning.
#
# Two uses:
#   1. --planner-config for train_anchor_predictor.py and
#      flow_planner.dpo.eval_multidim (they call load_composed_config).
#   2. --planner-config for finetune_anchor_planner.py.
#
# Mirrors goal_finetune.yaml structurally; the only semantic difference is
# `defaults.model: flow_planner_anchor`, which turns on the anchor cross-attn
# path and disables the legacy goal_dim.

project_root: /root/autodl-tmp/Flow-Planner
save_dir: /root/autodl-tmp/Flow-Planner/outputs/anchor_finetune/${now:%Y-%m-%d_%H-%M-%S}
save_every_since: 0
resume_path: null
pretrained_checkpoint: /root/autodl-tmp/Flow-Planner/checkpoints/flowplanner_no_goal.pth
project: FlowPlannerAnchor
job_name: anchor_finetune
logger_level: info
seed: 3402
device: cuda
num_workers: 4
use_wandb: false
pin_mem: true

train:
  batch_size: 32
  epoch: 20
  save_utd: 5

ddp:
  distributed: false
  world_size: 1
  rank: 0
  init_process_group: nccl
  addr: localhost
  port: 29529

model_type: x_start

defaults:
  - _self_
  - model: flow_planner_anchor
  - core: flow_matching
  - data/dataset: nuplan_data
  - data/input_aug: input_aug
  - normalization_stats: waypoints_norm_stats
  - ema: ema
  - optimizer: adamw
  - scheduler: warmup_const
